version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: momentum-db
    environment:
      POSTGRES_USER: momentum
      POSTGRES_PASSWORD: momentum_password
      POSTGRES_DB: momentum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
